# Alpha Agent local configuration.
# Copy to ~/.alpha-agent/config.toml or run `uv run alpha config init`.

[runtime]
home_dir = "~/.alpha-agent"
db_path = "alpha.db"
log_dir = "logs"
gateway_status_path = "gateway-status.json"
daemon_socket_path = "daemon.sock"
daemon_status_path = "daemon-status.json"

[llm]
provider = "mock"
# Leave empty to use the selected provider's default model.
model = ""
# Writes full LLM request/response payloads to debug logs when true.
debug_logging = false

[compatible]
base_url = "https://api.openai.com/v1"
api_key = ""

[llm.context]
# Active runtime context maintenance settings.
# Tool payload truncation runs before LLM handover compression.
tool_truncate_threshold_ratio = 0.60
handover_compress_threshold_ratio = 0.90
minimum_remaining_tokens = 10000
tool_string_truncate_chars = 300
expected_output_reserve_tokens = 4096
safety_margin_tokens = 1024

[llm.providers.openai-compatible]
max_context_tokens = 258400

[llm.providers.deepseek]
max_context_tokens = 1000000

[tools.bash]
# Disabled by default because this executes local foreground shell commands.
enabled = false
default_workdir = "workspace"
allowed_workdirs = ["workspace"]
default_timeout_seconds = 120
max_timeout_seconds = 600
max_output_chars = 30000
env_passthrough = []

[tools.files]
# Read-only file tools are enabled by default. file_patch stays disabled until
# both patch_enabled is true and write_roots is non-empty.
enabled = true
allowed_roots = ["workspace"]
patch_enabled = false
write_roots = []
max_read_chars = 20000
max_file_bytes = 1000000
max_search_results = 100
max_glob_results = 500
max_read_lines = 200
create_parent_dirs_enabled = false
max_output_chars = 30000

[cognition.consolidation]
enabled = true
interval_seconds = 300

[cognition.background]
enabled = true
startup_delay_seconds = 5
interval_seconds = 300
tick_timeout_seconds = 60

[cognition.background.intake]
batch_size = 64
min_sources = 1

[cognition.background.extraction]
batch_size = 12
min_sources = 1

[cognition.background.consolidation]
batch_size = 12
min_drafts = 1

[cognition.background.conflict]
batch_size = 4
min_conflicts = 1

[cognition.background.summary]
batch_size = 4
initial_min_beliefs = 12
changed_source_min = 6
invalidated_source_min = 1

[cognition.drive]
enabled = false
interval_seconds = 300
goal_cooldown_seconds = 3600
active_goal_limit = 8

[deepseek]
api_key = ""
reasoning_enabled = true
reasoning_effort = ""

[codex]
access_token = ""

[tavily]
# Enables the built-in web_search tool when set.
api_key = ""
