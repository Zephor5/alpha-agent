# Alpha Agent local configuration.
# Copy to ~/.alpha-agent/config.toml or run `uv run alpha config init`.

[runtime]
db_path = "~/.alpha-agent/alpha.db"
log_dir = "~/.alpha-agent/logs"
gateway_status_path = "~/.alpha-agent/gateway-status.json"
daemon_socket_path = "~/.alpha-agent/daemon.sock"
daemon_status_path = "~/.alpha-agent/daemon-status.json"

[llm]
provider = "mock"
# Leave empty to use the selected provider's default model.
model = ""
# Writes full LLM request/response payloads to debug logs when true.
debug_logging = false

[compatible]
base_url = "https://api.openai.com/v1"
api_key = ""

[memory]
retrieval_limit = 8

[context]
max_prompt_tokens = 6000
compression_threshold_ratio = 0.85
recent_tail_messages = 8
min_summary_tokens = 256
max_summary_tokens = 1024

[deepseek]
api_key = ""
reasoning_enabled = true
reasoning_effort = ""

[codex]
access_token = ""
